<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfólio Pessoal</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container">
            <a class="navbar-brand" href="#">Meu Portfólio</a>
        </div>
    </nav>

    <!-- HERO -->
    <section class="hero">

        <div class="hero-content">

            <!-- CURRÍCULO -->
            <div class="resume-card">
                <h1>Laís Victoria</h1>

                <h4 class="mb-3 text-info">
                    Estudante
                </h4>

                <p>
                    Sou uma estudande de Ciências da computação no ceub e sou apaixonada pelo munto da tecnologia e da programação.
                </p>

                <!-- CONTATOS -->
                <div class="contact-links">
                    <a href="https://www.linkedin.com/in/laís-vitoria-da-silva-lemos-a2887a339" target="_blank">
                        <i class="bi bi-linkedin"></i>
                        LinkedIn
                    </a>

                    <a href="https://github.com/byLaisLemos" target="_blank">
                        <i class="bi bi-github"></i>
                        GitHub
                    </a>
                </div>
            </div>

            <!-- IMAGEM -->
            <img
                src="images/eu.jpeg"
                alt="Foto perfil"
                class="profile-image"
            />

        </div>

    </section>

    <!-- PORTFÓLIO -->
    <section class="portfolio-section container">

        <h2 class="portfolio-title">
            Sobre mim
        </h2>

        <!-- CARROSSEL -->
        <div id="portfolioCarousel" class="carousel slide" data-bs-ride="carousel">

            <!-- INDICADORES -->
            <div class="carousel-indicators">
                <button type="button" data-bs-target="#portfolioCarousel" data-bs-slide-to="0" class="active"></button>
                <button type="button" data-bs-target="#portfolioCarousel" data-bs-slide-to="1"></button>
                <button type="button" data-bs-target="#portfolioCarousel" data-bs-slide-to="2"></button>
                <button type="button" data-bs-target="#portfolioCarousel" data-bs-slide-to="3"></button>
                <button type="button" data-bs-target="#portfolioCarousel" data-bs-slide-to="4"></button>
            </div>

            <!-- IMAGENS -->
            <div class="carousel-inner">

                <div class="carousel-item active">
                    <img src="images/Slide1.jpeg"
                        class="d-block w-100"
                        alt="Projeto 1">
                </div>

                <div class="carousel-item">
                    <img src="images/slide2.jpeg"
                        class="d-block w-100"
                        alt="Projeto 2">
                </div>

                <div class="carousel-item">
                    <img src="images/slide3.jpeg"
                        class="d-block w-100"
                        alt="Projeto 3">
                </div>

                <div class="carousel-item">
                    <img src="images/slide4.jpeg"
                        class="d-block w-100"
                        alt="Projeto 4">
                </div>

                <div class="carousel-item">
                    <img src="images/slide5.jpeg"
                        class="d-block w-100"
                        alt="Projeto 5">
                </div>

            </div>

            <!-- BOTÃO ANTERIOR -->
            <button class="carousel-control-prev"
                    type="button"
                    data-bs-target="#portfolioCarousel"
                    data-bs-slide="prev">

                <span class="carousel-control-prev-icon"></span>
            </button>

            <!-- BOTÃO PRÓXIMO -->
            <button class="carousel-control-next"
                    type="button"
                    data-bs-target="#portfolioCarousel"
                    data-bs-slide="next">

                <span class="carousel-control-next-icon"></span>
            </button>

        </div>

    </section>

    <section>
        <h2 class="portfolio-title">
            Currículo
        </h2>

        <div class="portfolio-section container" style="display: flex; justify-content: center;">
            <img src="images/curriculo.jpeg" style="display: flex; justify-content: center;"/>
        </div>
    </section>

    <!-- FOOTER -->
    <footer>
        © 2026 - Desenvolvido por Laís Victoria
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
